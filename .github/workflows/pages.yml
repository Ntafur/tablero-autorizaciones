name: Desplegar tablero en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues concurrentes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (lo activa si no lo está)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Preparar archivos del sitio
        run: |
          mkdir -p public
          cp tablero.html datos_tablero.xlsx public/
          cp index.html public/ 2>/dev/null || true
          touch public/.nojekyll

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
